    <meta charset="utf-8" />

      name="description"
      content="Automation and AI Native engineer roach: email, YouTube, Threads, GitHub, LinkedIn, and lecture links."

  <body>
    <main class="stage" aria-label="roach linktree">
      <section class="type-rig" aria-label="Typed profile links">
        <div class="machine-paper" id="machinePaper">
          <div class="paper-depth" aria-hidden="true"></div>
          <div class="paper-fibers" aria-hidden="true"></div>
          <div class="typed-output" id="typedOutput" aria-live="polite"></div>
          <div class="strike-guide" id="strikeGuide" aria-hidden="true"></div>
          <div class="impact-mark" id="impactMark" aria-hidden="true"></div>
          <div class="ribbon-window" id="ribbonWindow" aria-hidden="true"></div>
          <div class="type-slug" id="typeSlug" aria-hidden="true"></div>
        </div>
        <div class="platen-occlusion" aria-hidden="true"></div>
      </section>

      <img
        class="paper-mark"
        src="./assets/threads_profile.jpg"
        alt=""
        width="84"
        height="84"
        aria-hidden="true"
      />

      <button
        class="sound-button"
        id="soundButton"
        type="button"
        aria-label="타자기 소리 꺼짐. 클릭하면 켜기"
        aria-pressed="false"
      >
        <svg aria-hidden="true" viewBox="0 0 24 24" focusable="false">
          <path d="M4 9.4h3.7L13 5.2v13.6l-5.3-4.2H4z" />
          <path class="sound-wave sound-wave-one" d="M16 9.2c.7.8 1.1 1.7 1.1 2.8s-.4 2-1.1 2.8" />
          <path class="sound-wave sound-wave-two" d="M18.6 6.8A7.3 7.3 0 0 1 21 12a7.3 7.3 0 0 1-2.4 5.2" />
        </svg>
      </button>

      <noscript>
        <nav class="fallback-links" aria-label="Links">
          <a href="mailto:dev0jsh@gmail.com">dev0jsh@gmail.com</a>
          <a href="https://www.youtube.com/@dev_roach_log">YouTube</a>
          <a href="https://www.threads.com/@roach_log">Threads</a>
          <a href="https://github.com/tmdgusya">GitHub</a>
          <a href="https://www.linkedin.com/in/%EC%8A%B9%ED%98%84-%EC%A0%95-376842221/">LinkedIn</a>
