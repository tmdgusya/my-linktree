<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Automation and AI Native engineer roach: email, YouTube, Threads, LinkedIn, and lecture links."
    />
    <meta property="og:title" content="roach" />
    <meta
      property="og:description"
      content="Automation and AI Native engineer roach: email, YouTube, Threads, LinkedIn, and lecture links."
    />
    <meta property="og:image" content="./assets/threads_profile.jpg" />
    <title>roach</title>
    <link rel="icon" href="./assets/threads_profile.jpg" />
    <link rel="stylesheet" href="./styles.css" />
    <script src="./script.js" defer></script>
  </head>
  <body>
    <main class="stage" aria-label="roach linktree">
      <img
        class="profile-badge"
        src="./assets/threads_profile.jpg"
        alt="roach profile icon"
        width="72"
        height="72"
      />

      <section class="paper" aria-labelledby="typed-title">
        <div class="paper-fiber" aria-hidden="true"></div>
        <div class="typed-page">
          <p class="kicker">Linktree / roach</p>
          <h1 id="typed-title" class="typed-line" data-text="roach"></h1>
          <p
            class="typed-line intro"
            data-text="자동화 그리고 AI Native에 관심이 많은 엔지니어입니다."
          ></p>

          <ul class="typed-links" aria-label="Links">
            <li>
              <a
                class="typed-link"
                href="mailto:dev0jsh@gmail.com"
                data-label="Business Email"
                data-value="dev0jsh@gmail.com"
              ></a>
            </li>
            <li>
              <a
                class="typed-link"
                href="https://www.youtube.com/@dev_roach_log"
                target="_blank"
                rel="noreferrer"
                data-label="YouTube"
                data-value="youtube.com/@dev_roach_log"
              ></a>
            </li>
            <li>
              <a
                class="typed-link"
                href="https://www.threads.com/@roach_log"
                target="_blank"
                rel="noreferrer"
                data-label="Threads"
                data-value="threads.com/@roach_log"
              ></a>
            </li>
            <li>
              <a
                class="typed-link"
                href="https://www.linkedin.com/in/%EC%8A%B9%ED%98%84-%EC%A0%95-376842221/"
                target="_blank"
                rel="noreferrer"
                data-label="LinkedIn"
                data-value="linkedin.com/in/승현-정-376842221"
              ></a>
            </li>
            <li>
              <a
                class="typed-link pending"
                href="#"
                aria-disabled="true"
                data-label="Lecture"
                data-value="coming soon"
              ></a>
            </li>
          </ul>
        </div>
      </section>
    </main>
  </body>
</html>
